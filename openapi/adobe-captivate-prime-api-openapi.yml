openapi: 3.1.0
info:
  title: Adobe Captivate Prime API (Learning Manager)
  description: >-
    The Adobe Learning Manager (formerly Captivate Prime) API v2 provides
    programmatic access to the Learning Management System for managing learning
    objects, courses, users, enrollments, certifications, skills, badges,
    gamification, catalogs, and user groups. The API follows the JSON:API
    specification and uses OAuth 2.0 for authentication. It enables integration
    with third-party systems for automating learner management, content
    delivery, and reporting.
  version: '2'
  contact:
    name: Adobe Learning Manager Support
    url: https://helpx.adobe.com/learning-manager/kb/helpdesk.html
  termsOfService: https://www.adobe.com/legal/terms.html
  license:
    name: Adobe Terms of Use
    url: https://www.adobe.com/legal/terms.html
externalDocs:
  description: Adobe Learning Manager API v2 Documentation
  url: https://captivateprime.adobe.com/docs/primeapi/v2/
servers:
- url: https://learningmanager.adobe.com/primeapi/v2
  description: Adobe Learning Manager Production API
tags:
- name: Account
  description: Retrieve and manage account-level settings
- name: Badges
  description: Manage badges awarded to learners for achievements
- name: Catalogs
  description: Manage content catalogs that organize learning objects
- name: Certifications
  description: Manage certification programs and compliance tracking
- name: Enrollments
  description: Manage learner enrollments in courses and learning programs
- name: Gamification
  description: Manage gamification points and leaderboard features
- name: Jobs
  description: Manage bulk import/export jobs for data operations
- name: Learning Objects
  description: >-
    Manage learning objects including courses, learning programs,
    certifications, and job aids
- name: Notifications
  description: Manage user notifications and announcements
- name: Skills
  description: Manage skills and skill levels associated with learning content
- name: User Groups
  description: Manage groups of users for targeted content delivery
- name: Users
  description: Manage learner, manager, author, and admin user accounts
security:
- oauth2: []
paths:
  /learningObjects:
    get:
      operationId: getLearningObjects
      summary: Adobe Captivate List Learning Objects
      description: >-
        Retrieves a paginated list of learning objects available to the
        authenticated user. Learning objects include courses, learning programs,
        certifications, and job aids. Supports filtering by type, catalog,
        skill, tag, and status.
      tags:
      - Learning Objects
      parameters:
      - $ref: '#/components/parameters/pageOffset'
      - $ref: '#/components/parameters/pageLimit'
      - $ref: '#/components/parameters/sort'
      - name: filter.loTypes
        in: query
        description: >-
          Comma-separated list of learning object types to filter by
        schema:
          type: string
          enum:
          - course
          - learningProgram
          - certification
          - jobAid
      - name: filter.catalogIds
        in: query
        description: Comma-separated list of catalog IDs to filter by
        schema:
          type: string
      - name: filter.skillName
        in: query
        description: Filter by skill name
        schema:
          type: string
      - name: filter.tagName
        in: query
        description: Filter by tag name
        schema:
          type: string
      - name: filter.loState
        in: query
        description: Filter by learning object state
        schema:
          type: string
          enum:
          - Active
          - Retired
      - name: include
        in: query
        description: >-
          Comma-separated list of related resources to include. Valid values:
          instances, enrollment, skills, subLOs, prerequisiteLOs,
          supplementaryResources, authors, catalogLabels
        schema:
          type: string
      responses:
        '200':
          description: List of learning objects
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/LearningObjectListResponse'
              examples:
                getLearningObjects200Example:
                  summary: Default getLearningObjects 200 response
                  x-microcks-default: true
                  value:
                    data:
                    - example
                    links:
                      self: https://example.com/path/abc123
                      next: https://example.com/path/abc123
                      prev: https://example.com/path/abc123
                    included:
                    - {}
        '400':
          description: Invalid filter parameters
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                getLearningObjects400Example:
                  summary: Default getLearningObjects 400 response
                  x-microcks-default: true
                  value:
                    source:
                      info: example
                    status: active
                    title: example
                    detail: example
                    code: example
        '401':
          description: Unauthorized - missing or invalid access token
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                getLearningObjects401Example:
                  summary: Default getLearningObjects 401 response
                  x-microcks-default: true
                  value:
                    source:
                      info: example
                    status: active
                    title: example
                    detail: example
                    code: example
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /learningObjects/{learningObjectId}:
    get:
      operationId: getLearningObject
      summary: Adobe Captivate Get a Learning Object
      description: >-
        Retrieves a single learning object by its ID, including its metadata,
        instances, and relationships. The response follows JSON:API format with
        optional included resources.
      tags:
      - Learning Objects
      parameters:
      - $ref: '#/components/parameters/learningObjectId'
      - name: include
        in: query
        description: >-
          Comma-separated list of related resources to include in the response
        schema:
          type: string
      responses:
        '200':
          description: Learning object details
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/LearningObjectResponse'
              examples:
                getLearningObject200Example:
                  summary: Default getLearningObject 200 response
                  x-microcks-default: true
                  value:
                    data:
                      id: abc123
                      type: standard
                      attributes:
                        authorNames:
