  /users:
    get:
      operationId: getUsers
      summary: Adobe Captivate List Users
      description: >-
        Retrieves a paginated list of users in the account. Supports filtering
        by role, active status, and user group. Only accessible by admin and
        integration admin roles.
      tags:
