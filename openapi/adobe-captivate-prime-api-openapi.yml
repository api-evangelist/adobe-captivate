components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication via Adobe IMS. Supports authorization code
        flow for user-context access and client credentials flow for
        application-level access.
      flows:
        authorizationCode:
          authorizationUrl: https://learningmanager.adobe.com/oauth/o/authorize
          tokenUrl: https://learningmanager.adobe.com/oauth/token
          refreshUrl: https://learningmanager.adobe.com/oauth/token/refresh
          scopes:
            learner:read: Read access to learner data
            learner:write: Write access to learner data
            admin:read: Read access to admin data
            admin:write: Write access to admin data
        clientCredentials:
          tokenUrl: https://learningmanager.adobe.com/oauth/token
          scopes:
            learner:read: Read access to learner data
            admin:read: Read access to admin data
            admin:write: Write access to admin data
  parameters:
    learningObjectId:
      name: learningObjectId
      in: path
      required: true
      description: >-
        The unique identifier of the learning object (format: course:XXXXXX,
        learningProgram:XXXXXX, certification:XXXXXX, or jobAid:XXXXXX)
      schema:
        type: string
    userId:
      name: userId
      in: path
      required: true
      description: The unique identifier of the user
      schema:
        type: string
    enrollmentId:
      name: enrollmentId
      in: path
      required: true
      description: The unique identifier of the enrollment
      schema:
        type: string
    catalogId:
      name: catalogId
      in: path
      required: true
      description: The unique identifier of the catalog
      schema:
        type: string
    skillId:
      name: skillId
      in: path
      required: true
      description: The unique identifier of the skill
      schema:
        type: string
    badgeId:
      name: badgeId
      in: path
      required: true
      description: The unique identifier of the badge
      schema:
        type: string
    userGroupId:
      name: userGroupId
      in: path
      required: true
      description: The unique identifier of the user group
      schema:
        type: string
    jobId:
      name: jobId
      in: path
      required: true
      description: The unique identifier of the job
      schema:
        type: string
    pageOffset:
      name: page[offset]
      in: query
      description: The offset for pagination (number of records to skip)
      schema:
        type: integer
        default: 0
        minimum: 0
    pageLimit:
      name: page[limit]
      in: query
      description: Maximum number of records to return per page (max 10)
      schema:
        type: integer
        default: 10
        maximum: 10
    sort:
      name: sort
      in: query
      description: >-
        Sort field and direction. Prefix with - for descending order.
        Example: -dateCreated, name, -dateUpdated
      schema:
        type: string
  schemas:
    LearningObject:
      type: object
      description: >-
        A learning object representing a course, learning program,
        certification, or job aid in the Learning Manager system
      properties:
        id:
          type: string
          description: Unique identifier for the learning object
        type:
          type: string
          description: JSON:API resource type
          const: learningObject
        attributes:
          type: object
          properties:
            authorNames:
              type: array
              description: Names of the content authors
              items:
                type: string
            dateCreated:
              type: string
              format: date-time
              description: Timestamp when the learning object was created
            datePublished:
              type: string
              format: date-time
              description: Timestamp when the learning object was published
            dateUpdated:
              type: string
              format: date-time
              description: Timestamp of the last update
            duration:
              type: integer
              description: Estimated duration to complete in seconds
            effectiveModifiedDate:
              type: string
              format: date-time
              description: Effective modification date
            enrollmentType:
              type: string
              description: How users can enroll in this learning object
              enum:
              - Self Enrolled
              - Manager Nominated
              - Admin Enrolled
            imageUrl:
              type: string
              format: uri
              description: URL of the learning object thumbnail image
            loFormat:
              type: string
              description: Content delivery format
              enum:
              - Self Paced
              - Blended
              - Classroom
              - Virtual Classroom
              - Activity
            loType:
              type: string
              description: Type of learning object
              enum:
              - course
              - learningProgram
              - certification
              - jobAid
            localizedMetadata:
              type: array
              description: Metadata in different locales
              items:
                $ref: '#/components/schemas/LocalizedMetadata'
            state:
              type: string
              description: Current state of the learning object
              enum:
              - Active
              - Retired
              - Published
              - Draft
            tags:
              type: array
              description: Tags associated with the learning object
              items:
                type: string
            unenrollmentAllowed:
              type: boolean
              description: Whether learners can self-unenroll
        relationships:
          type: object
          properties:
            instances:
              $ref: '#/components/schemas/Relationship'
            skills:
              $ref: '#/components/schemas/Relationship'
            prerequisiteLOs:
              $ref: '#/components/schemas/Relationship'
            subLOs:
              $ref: '#/components/schemas/Relationship'
            authors:
              $ref: '#/components/schemas/Relationship'
            catalog:
              $ref: '#/components/schemas/Relationship'
    LocalizedMetadata:
      type: object
      description: Metadata for a learning object in a specific locale
      properties:
        description:
          type: string
          description: Description in the specified locale
        locale:
          type: string
          description: The locale code (e.g. en-US, fr-FR)
        name:
          type: string
          description: Name in the specified locale
        overview:
          type: string
          description: Overview or summary text
        richTextOverview:
          type: string
          description: Rich text (HTML) overview content
    LearningObjectInstance:
      type: object
      description: >-
        An instance of a learning object representing a specific offering
        with its own timeline and enrollment settings
      properties:
        id:
          type: string
          description: Unique identifier for the instance
        type:
          type: string
          const: learningObjectInstance
        attributes:
          type: object
          properties:
            completionDeadline:
              type: string
              format: date-time
              description: Deadline by which the learner must complete the course
            enrollmentDeadline:
              type: string
              format: date-time
              description: Deadline for enrolling in this instance
            isDefault:
              type: boolean
              description: Whether this is the default instance
            seatLimit:
              type: integer
              description: Maximum number of learners who can enroll
            state:
              type: string
              description: Current state of the instance
              enum:
              - Active
              - Retired
    User:
      type: object
      description: A user in the Learning Manager system
      properties:
        id:
          type: string
          description: Unique user identifier
        type:
          type: string
          const: user
        attributes:
          type: object
          properties:
            avatarUrl:
              type: string
              format: uri
              description: URL of the user's avatar image
            email:
              type: string
              format: email
              description: User's email address
            name:
              type: string
              description: User's full name
            pointsEarned:
              type: integer
              description: Total gamification points earned
            profile:
              type: string
              description: Profile bio text
            roles:
              type: array
              description: List of roles assigned to the user
              items:
                type: string
                enum:
                - learner
                - manager
                - author
                - admin
                - integrationAdmin
            state:
              type: string
              description: User account state
              enum:
              - ACTIVE
              - DELETED
              - SUSPENDED
            userType:
              type: string
              description: User type classification
              enum:
              - Internal
              - External
        relationships:
          type: object
          properties:
            manager:
              $ref: '#/components/schemas/Relationship'
            userGroups:
              $ref: '#/components/schemas/Relationship'
            account:
              $ref: '#/components/schemas/Relationship'
    Enrollment:
      type: object
      description: A learner's enrollment in a learning object instance
      properties:
        id:
          type: string
          description: Unique enrollment identifier
        type:
          type: string
          const: enrollment
        attributes:
          type: object
          properties:
            completedOn:
              type: string
              format: date-time
              description: Timestamp when the enrollment was completed
            dateEnrolled:
              type: string
              format: date-time
              description: Timestamp when the learner was enrolled
            dateStarted:
              type: string
              format: date-time
              description: Timestamp when the learner started
            hasPassed:
              type: boolean
              description: Whether the learner passed the learning object
            progressPercent:
              type: integer
              description: Completion progress as a percentage (0-100)
              minimum: 0
              maximum: 100
            score:
              type: number
              description: Score achieved by the learner
            state:
              type: string
              description: Current enrollment state
              enum:
              - ENROLLED
              - STARTED
              - COMPLETED
              - PENDING_APPROVAL
              - REJECTED
              - EXPIRED
        relationships:
          type: object
          properties:
            learner:
              $ref: '#/components/schemas/Relationship'
            learningObject:
              $ref: '#/components/schemas/Relationship'
            loInstance:
              $ref: '#/components/schemas/Relationship'
    Catalog:
      type: object
      description: A catalog that organizes and controls access to learning objects
      properties:
        id:
          type: string
          description: Unique catalog identifier
        type:
          type: string
          const: catalog
        attributes:
          type: object
          properties:
            dateCreated:
              type: string
              format: date-time
              description: Timestamp when the catalog was created
            dateUpdated:
              type: string
              format: date-time
              description: Timestamp of the last update
            description:
              type: string
              description: Catalog description
            isDefault:
              type: boolean
              description: Whether this is the default catalog
            isInternallySearchable:
              type: boolean
              description: Whether learning objects in this catalog appear in search
            name:
              type: string
              description: Catalog name
            state:
              type: string
              description: Catalog state
              enum:
              - Enabled
              - Disabled
        relationships:
          type: object
          properties:
            learningObjects:
              $ref: '#/components/schemas/Relationship'
    Skill:
      type: object
      description: A skill competency defined in the Learning Manager system
      properties:
        id:
          type: string
          description: Unique skill identifier
        type:
          type: string
          const: skill
        attributes:
          type: object
          properties:
            description:
              type: string
              description: Skill description
            name:
              type: string
              description: Skill name
            state:
              type: string
              description: Skill state
              enum:
              - Active
              - Retired
        relationships:
          type: object
          properties:
            skillLevels:
              $ref: '#/components/schemas/Relationship'
            learningObjects:
              $ref: '#/components/schemas/Relationship'
    Badge:
      type: object
      description: A badge awarded to learners for achievements
      properties:
        id:
          type: string
          description: Unique badge identifier
        type:
          type: string
          const: badge
        attributes:
          type: object
          properties:
            imageUrl:
              type: string
              format: uri
              description: URL of the badge image
            name:
              type: string
              description: Badge name
            state:
              type: string
              description: Badge state
              enum:
              - Active
              - Retired
    UserGroup:
      type: object
      description: A group of users for organizing and targeting content
      properties:
        id:
          type: string
          description: Unique user group identifier
        type:
          type: string
          const: userGroup
        attributes:
          type: object
          properties:
            dateCreated:
              type: string
              format: date-time
              description: Timestamp when the group was created
            description:
              type: string
              description: Group description
            name:
              type: string
              description: Group name
            state:
              type: string
              description: Group state
              enum:
              - Active
              - Deleted
            userCount:
              type: integer
              description: Number of users in the group
    Job:
      type: object
      description: A bulk import/export job
      properties:
        id:
          type: string
          description: Unique job identifier
        type:
          type: string
          const: job
        attributes:
          type: object
          properties:
            dateCreated:
              type: string
              format: date-time
              description: Timestamp when the job was created
            dateCompleted:
              type: string
              format: date-time
              description: Timestamp when the job completed
            description:
              type: string
              description: Job description
            downloadUrl:
              type: string
              format: uri
              description: URL to download the job result file (for export jobs)
            jobType:
              type: string
              description: The type of bulk operation
              enum:
              - userImport
              - learnerTranscriptExport
              - trainingReportExport
            status:
              type: string
              description: Current job status
              enum:
              - Submitted
              - InProgress
              - Completed
              - Failed
    Account:
      type: object
      description: A Learning Manager account
      properties:
        id:
          type: string
          description: Unique account identifier
        type:
          type: string
          const: account
        attributes:
          type: object
          properties:
            dateCreated:
              type: string
              format: date-time
              description: Account creation timestamp
            gamificationEnabled:
              type: boolean
              description: Whether gamification features are enabled
            locale:
              type: string
              description: Default locale for the account
            name:
              type: string
              description: Account name
            subdomain:
              type: string
              description: The Learning Manager subdomain
            timezone:
              type: string
              description: Default timezone for the account
    Notification:
      type: object
      description: A user notification
      properties:
        id:
          type: string
          description: Unique notification identifier
        type:
          type: string
          const: userNotification
        attributes:
          type: object
          properties:
            actionTaken:
              type: boolean
              description: Whether the user has acted on this notification
            channel:
              type: string
              description: Notification delivery channel
            dateCreated:
              type: string
              format: date-time
              description: Notification creation timestamp
            message:
              type: object
              description: Notification message content
            modelType:
              type: string
              description: The type of model this notification relates to
            read:
              type: boolean
              description: Whether the notification has been read
    GamificationPoints:
      type: object
      description: Gamification points for a user
      properties:
        id:
          type: string
          description: Unique identifier
        type:
          type: string
          const: gamification
        attributes:
          type: object
          properties:
            learnerPoints:
              type: integer
              description: Points earned through learning activities
            managerPoints:
              type: integer
              description: Points earned as a manager
            overallPoints:
              type: integer
              description: Total points across all categories
    Relationship:
      type: object
      description: A JSON:API relationship object
      properties:
        data:
          oneOf:
          - $ref: '#/components/schemas/ResourceIdentifier'
          - type: array
            items:
              $ref: '#/components/schemas/ResourceIdentifier'
        links:
          type: object
          properties:
            related:
              type: string
              format: uri
              description: URL to fetch the related resource
    ResourceIdentifier:
      type: object
      description: JSON:API resource identifier
      required:
      - id
      - type
      properties:
        id:
          type: string
          description: Resource identifier
        type:
          type: string
          description: Resource type name
    PaginationLinks:
      type: object
      description: Pagination links following JSON:API conventions
      properties:
        self:
          type: string
          format: uri
          description: URL for the current page
        next:
          type: string
          format: uri
          description: URL for the next page
        prev:
          type: string
          format: uri
          description: URL for the previous page
    LearningObjectListResponse:
      type: object
      description: Paginated list of learning objects
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LearningObject'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        included:
          type: array
          description: Related resources included via the include parameter
          items:
            type: object
    LearningObjectResponse:
      type: object
      description: Single learning object response
      properties:
        data:
          $ref: '#/components/schemas/LearningObject'
        included:
          type: array
          items:
            type: object
    LearningObjectInstanceListResponse:
      type: object
      description: Paginated list of learning object instances
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LearningObjectInstance'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    UserListResponse:
      type: object
      description: Paginated list of users
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    UserResponse:
      type: object
      description: Single user response
      properties:
        data:
          $ref: '#/components/schemas/User'
    UserUpdateRequest:
      type: object
      description: Request body for updating a user
      required:
      - data
      properties:
        data:
          type: object
          required:
          - id
          - type
          - attributes
          properties:
            id:
              type: string
              description: User ID
            type:
              type: string
              const: user
            attributes:
              type: object
              properties:
                name:
                  type: string
                  description: Updated user name
                email:
                  type: string
                  format: email
                  description: Updated email address
                profile:
                  type: string
                  description: Updated profile bio
                state:
                  type: string
                  enum:
                  - ACTIVE
                  - DELETED
                  - SUSPENDED
    EnrollmentListResponse:
      type: object
      description: Paginated list of enrollments
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Enrollment'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    EnrollmentResponse:
      type: object
      description: Single enrollment response
      properties:
        data:
          $ref: '#/components/schemas/Enrollment'
    EnrollmentCreateRequest:
      type: object
      description: Request body for creating an enrollment
      required:
      - data
      properties:
        data:
          type: object
          required:
          - type
          - attributes
          properties:
            type:
              type: string
              const: enrollment
            attributes:
              type: object
              properties:
                loInstanceId:
                  type: string
                  description: ID of the learning object instance to enroll in
            relationships:
              type: object
              properties:
                loInstance:
                  type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ResourceIdentifier'
                learner:
                  type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/ResourceIdentifier'
    CatalogListResponse:
      type: object
      description: Paginated list of catalogs
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Catalog'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    CatalogResponse:
      type: object
      description: Single catalog response
      properties:
        data:
          $ref: '#/components/schemas/Catalog'
    SkillListResponse:
      type: object
      description: Paginated list of skills
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    SkillResponse:
      type: object
      description: Single skill response
      properties:
        data:
          $ref: '#/components/schemas/Skill'
    BadgeListResponse:
      type: object
      description: Paginated list of badges
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    BadgeResponse:
      type: object
      description: Single badge response
      properties:
        data:
          $ref: '#/components/schemas/Badge'
    UserGroupListResponse:
      type: object
      description: Paginated list of user groups
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserGroup'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    UserGroupResponse:
      type: object
      description: Single user group response
      properties:
        data:
          $ref: '#/components/schemas/UserGroup'
    CertificationListResponse:
      type: object
      description: Paginated list of certifications
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LearningObject'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    GamificationPointsResponse:
      type: object
      description: User gamification points response
      properties:
        data:
          $ref: '#/components/schemas/GamificationPoints'
    NotificationListResponse:
      type: object
      description: Paginated list of notifications
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    JobListResponse:
      type: object
      description: Paginated list of jobs
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    JobResponse:
      type: object
      description: Single job response
      properties:
        data:
          $ref: '#/components/schemas/Job'
    JobCreateRequest:
      type: object
      description: Request body for creating a bulk job
      required:
      - data
      properties:
        data:
          type: object
          required:
          - type
          - attributes
          properties:
            type:
              type: string
              const: job
            attributes:
              type: object
              required:
              - jobType
              properties:
                jobType:
                  type: string
                  description: The type of bulk operation
                  enum:
                  - userImport
                  - learnerTranscriptExport
                  - trainingReportExport
                description:
                  type: string
                  description: Description for this job
    AccountResponse:
      type: object
      description: Account details response
      properties:
        data:
          $ref: '#/components/schemas/Account'
    UserSkillListResponse:
      type: object
      description: Paginated list of user skills
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                const: userSkill
              attributes:
                type: object
                properties:
                  dateAchieved:
                    type: string
                    format: date-time
                    description: When the skill was achieved
                  pointsEarned:
                    type: number
                    description: Points earned toward this skill
              relationships:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Relationship'
                  skillLevel:
                    $ref: '#/components/schemas/Relationship'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    UserBadgeListResponse:
      type: object
      description: Paginated list of user badges
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                const: userBadge
              attributes:
                type: object
                properties:
                  assertionUrl:
                    type: string
                    format: uri
                    description: Open Badge assertion URL
                  dateAchieved:
                    type: string
                    format: date-time
                    description: When the badge was earned
              relationships:
                type: object
                properties:
                  badge:
                    $ref: '#/components/schemas/Relationship'
                  learningObject:
                    $ref: '#/components/schemas/Relationship'
        links:
          $ref: '#/components/schemas/PaginationLinks'
    ErrorResponse:
      type: object
      description: Error response following JSON:API error format
      properties:
        source:
          type: object
          properties:
            info:
              type: string
              description: URL to the API documentation
        status:
          type: string
          description: HTTP status code
        title:
          type: string
          description: Short error title
        detail:
          type: string
          description: Human-readable error description
        code:
          type: string
          description: Machine-readable error code
