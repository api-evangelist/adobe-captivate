naftiko: 1.0.0-alpha2
info:
  label: Adobe Captivate Prime API (Learning Manager) — User Groups
  description: 'Adobe Captivate Prime API (Learning Manager) — User Groups. 2 operations. Lead operation: Adobe Captivate
    List User Groups. Self-contained Naftiko capability covering one Adobe Captivate business surface.'
  tags:
  - Adobe Captivate
  - User Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_CAPTIVATE_API_KEY: ADOBE_CAPTIVATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: prime-user-groups
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — User Groups business capability. Self-contained, no shared
      references.
    resources:
    - name: userGroups
      path: /userGroups
      operations:
      - name: getusergroups
        method: GET
        description: Adobe Captivate List User Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter.name
          in: query
          type: string
          description: Filter by user group name
    - name: userGroups-userGroupId
      path: /userGroups/{userGroupId}
      operations:
      - name: getusergroup
        method: GET
        description: Adobe Captivate Get a User Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-user-groups-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — User Groups. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/usergroups
      name: usergroups
      description: REST surface for userGroups.
      operations:
      - method: GET
        name: getusergroups
        description: Adobe Captivate List User Groups
        call: prime-user-groups.getusergroups
        with:
          filter.name: rest.filter.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/usergroups/{usergroupid}
      name: usergroups-usergroupid
      description: REST surface for userGroups-userGroupId.
      operations:
      - method: GET
        name: getusergroup
        description: Adobe Captivate Get a User Group
        call: prime-user-groups.getusergroup
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prime-user-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — User Groups. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-list-user-groups
      description: Adobe Captivate List User Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-user-groups.getusergroups
      with:
        filter.name: tools.filter.name
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-get-user-group
      description: Adobe Captivate Get a User Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-user-groups.getusergroup
      outputParameters:
      - type: object
        mapping: $.
