naftiko: 1.0.0-alpha2
info:
  label: Adobe Captivate Prime API (Learning Manager) — Notifications
  description: 'Adobe Captivate Prime API (Learning Manager) — Notifications. 1 operations. Lead operation: Adobe Captivate
    List User Notifications. Self-contained Naftiko capability covering one Adobe Captivate business surface.'
  tags:
  - Adobe Captivate
  - Notifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_CAPTIVATE_API_KEY: ADOBE_CAPTIVATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: prime-notifications
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — Notifications business capability. Self-contained, no shared
      references.
    resources:
    - name: users-userId-userNotifications
      path: /users/{userId}/userNotifications
      operations:
      - name: getusernotifications
        method: GET
        description: Adobe Captivate List User Notifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-notifications-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — Notifications. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users/{userid}/usernotifications
      name: users-userid-usernotifications
      description: REST surface for users-userId-userNotifications.
      operations:
      - method: GET
        name: getusernotifications
        description: Adobe Captivate List User Notifications
        call: prime-notifications.getusernotifications
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prime-notifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — Notifications. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-list-user-notifications
      description: Adobe Captivate List User Notifications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-notifications.getusernotifications
      outputParameters:
      - type: object
        mapping: $.
