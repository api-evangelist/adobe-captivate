naftiko: 1.0.0-alpha2
info:
  label: Adobe Captivate Prime API (Learning Manager) — Account
  description: 'Adobe Captivate Prime API (Learning Manager) — Account. 1 operations. Lead operation: Adobe Captivate Get
    Account Details. Self-contained Naftiko capability covering one Adobe Captivate business surface.'
  tags:
  - Adobe Captivate
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_CAPTIVATE_API_KEY: ADOBE_CAPTIVATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: prime-account
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — Account business capability. Self-contained, no shared references.
    resources:
    - name: account
      path: /account
      operations:
      - name: getaccount
        method: GET
        description: Adobe Captivate Get Account Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-account-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — Account. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/account
      name: account
      description: REST surface for account.
      operations:
      - method: GET
        name: getaccount
        description: Adobe Captivate Get Account Details
        call: prime-account.getaccount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prime-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — Account. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-get-account-details
      description: Adobe Captivate Get Account Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-account.getaccount
      outputParameters:
      - type: object
        mapping: $.
