naftiko: 1.0.0-alpha2
info:
  label: Adobe Captivate Prime API (Learning Manager) — Skills
  description: 'Adobe Captivate Prime API (Learning Manager) — Skills. 3 operations. Lead operation: Adobe Captivate List
    Skills. Self-contained Naftiko capability covering one Adobe Captivate business surface.'
  tags:
  - Adobe Captivate
  - Skills
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_CAPTIVATE_API_KEY: ADOBE_CAPTIVATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: prime-skills
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — Skills business capability. Self-contained, no shared references.
    resources:
    - name: skills
      path: /skills
      operations:
      - name: getskills
        method: GET
        description: Adobe Captivate List Skills
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter.name
          in: query
          type: string
          description: Filter skills by name (partial match supported)
        - name: include
          in: query
          type: string
          description: 'Comma-separated list of related resources to include. Valid values: skillLevels, learningObjects'
    - name: skills-skillId
      path: /skills/{skillId}
      operations:
      - name: getskill
        method: GET
        description: Adobe Captivate Get a Skill
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: string
          description: Comma-separated list of related resources to include
    - name: users-userId-userSkills
      path: /users/{userId}/userSkills
      operations:
      - name: getuserskills
        method: GET
        description: Adobe Captivate List User Skills
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: string
          description: 'Comma-separated list of related resources. Valid values: skill, skillLevel'
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-skills-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — Skills. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/skills
      name: skills
      description: REST surface for skills.
      operations:
      - method: GET
        name: getskills
        description: Adobe Captivate List Skills
        call: prime-skills.getskills
        with:
          filter.name: rest.filter.name
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/skills/{skillid}
      name: skills-skillid
      description: REST surface for skills-skillId.
      operations:
      - method: GET
        name: getskill
        description: Adobe Captivate Get a Skill
        call: prime-skills.getskill
        with:
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}/userskills
      name: users-userid-userskills
      description: REST surface for users-userId-userSkills.
      operations:
      - method: GET
        name: getuserskills
        description: Adobe Captivate List User Skills
        call: prime-skills.getuserskills
        with:
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prime-skills-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — Skills. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-list-skills
      description: Adobe Captivate List Skills
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-skills.getskills
      with:
        filter.name: tools.filter.name
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-get-skill
      description: Adobe Captivate Get a Skill
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-skills.getskill
      with:
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-list-user-skills
      description: Adobe Captivate List User Skills
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-skills.getuserskills
      with:
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
