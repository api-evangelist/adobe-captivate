naftiko: 1.0.0-alpha2
info:
  label: Adobe Captivate Prime API (Learning Manager) — Learning Objects
  description: 'Adobe Captivate Prime API (Learning Manager) — Learning Objects. 4 operations. Lead operation: Adobe Captivate
    List Learning Objects. Self-contained Naftiko capability covering one Adobe Captivate business surface.'
  tags:
  - Adobe Captivate
  - Learning Objects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_CAPTIVATE_API_KEY: ADOBE_CAPTIVATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: prime-learning-objects
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — Learning Objects business capability. Self-contained, no shared
      references.
    resources:
    - name: learningObjects
      path: /learningObjects
      operations:
      - name: getlearningobjects
        method: GET
        description: Adobe Captivate List Learning Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter.loTypes
          in: query
          type: string
          description: Comma-separated list of learning object types to filter by
        - name: filter.catalogIds
          in: query
          type: string
          description: Comma-separated list of catalog IDs to filter by
        - name: filter.skillName
          in: query
          type: string
          description: Filter by skill name
        - name: filter.tagName
          in: query
          type: string
          description: Filter by tag name
        - name: filter.loState
          in: query
          type: string
          description: Filter by learning object state
        - name: include
          in: query
          type: string
          description: 'Comma-separated list of related resources to include. Valid values: instances, enrollment, skills,
            subLOs, prerequisiteLOs, supplementaryResources, authors, cat'
    - name: learningObjects-learningObjectId
      path: /learningObjects/{learningObjectId}
      operations:
      - name: getlearningobject
        method: GET
        description: Adobe Captivate Get a Learning Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: string
          description: Comma-separated list of related resources to include in the response
    - name: learningObjects-learningObjectId-instances
      path: /learningObjects/{learningObjectId}/instances
      operations:
      - name: getlearningobjectinstances
        method: GET
        description: Adobe Captivate List Instances of a Learning Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      operations:
      - name: searchlearningobjects
        method: GET
        description: Adobe Captivate Search Learning Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: The search query string
          required: true
        - name: filter.loTypes
          in: query
          type: string
          description: Comma-separated list of learning object types to search
        - name: filter.catalogIds
          in: query
          type: string
          description: Comma-separated list of catalog IDs to search within
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-learning-objects-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — Learning Objects. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/learningobjects
      name: learningobjects
      description: REST surface for learningObjects.
      operations:
      - method: GET
        name: getlearningobjects
        description: Adobe Captivate List Learning Objects
        call: prime-learning-objects.getlearningobjects
        with:
          filter.loTypes: rest.filter.loTypes
          filter.catalogIds: rest.filter.catalogIds
          filter.skillName: rest.filter.skillName
          filter.tagName: rest.filter.tagName
          filter.loState: rest.filter.loState
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/learningobjects/{learningobjectid}
      name: learningobjects-learningobjectid
      description: REST surface for learningObjects-learningObjectId.
      operations:
      - method: GET
        name: getlearningobject
        description: Adobe Captivate Get a Learning Object
        call: prime-learning-objects.getlearningobject
        with:
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/learningobjects/{learningobjectid}/instances
      name: learningobjects-learningobjectid-instances
      description: REST surface for learningObjects-learningObjectId-instances.
      operations:
      - method: GET
        name: getlearningobjectinstances
        description: Adobe Captivate List Instances of a Learning Object
        call: prime-learning-objects.getlearningobjectinstances
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: GET
        name: searchlearningobjects
        description: Adobe Captivate Search Learning Objects
        call: prime-learning-objects.searchlearningobjects
        with:
          query: rest.query
          filter.loTypes: rest.filter.loTypes
          filter.catalogIds: rest.filter.catalogIds
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prime-learning-objects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — Learning Objects. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-list-learning-objects
      description: Adobe Captivate List Learning Objects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-learning-objects.getlearningobjects
      with:
        filter.loTypes: tools.filter.loTypes
        filter.catalogIds: tools.filter.catalogIds
        filter.skillName: tools.filter.skillName
        filter.tagName: tools.filter.tagName
        filter.loState: tools.filter.loState
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-get-learning-object
      description: Adobe Captivate Get a Learning Object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-learning-objects.getlearningobject
      with:
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-list-instances-learning
      description: Adobe Captivate List Instances of a Learning Object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-learning-objects.getlearningobjectinstances
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-search-learning-objects
      description: Adobe Captivate Search Learning Objects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-learning-objects.searchlearningobjects
      with:
        query: tools.query
        filter.loTypes: tools.filter.loTypes
        filter.catalogIds: tools.filter.catalogIds
      outputParameters:
      - type: object
        mapping: $.
