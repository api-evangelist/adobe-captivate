  - type: http
    namespace: prime-badges
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — Badges business capability. Self-contained, no shared references.
    resources:
    - name: badges
      path: /badges
      operations:
      - name: getbadges
        method: GET
        description: Adobe Captivate List Badges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: badges-badgeId
      path: /badges/{badgeId}
      operations:
      - name: getbadge
        method: GET
        description: Adobe Captivate Get a Badge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userId-userBadges
      path: /users/{userId}/userBadges
      operations:
      - name: getuserbadges
        method: GET
        description: Adobe Captivate List User Badges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-badges-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — Badges. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/badges
      name: badges
      description: REST surface for badges.
      operations:
      - method: GET
        name: getbadges
        description: Adobe Captivate List Badges
        call: prime-badges.getbadges
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/badges/{badgeid}
      name: badges-badgeid
      description: REST surface for badges-badgeId.
      operations:
      - method: GET
        name: getbadge
        description: Adobe Captivate Get a Badge
        call: prime-badges.getbadge
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}/userbadges
      name: users-userid-userbadges
      description: REST surface for users-userId-userBadges.
      operations:
      - method: GET
        name: getuserbadges
        description: Adobe Captivate List User Badges
        call: prime-badges.getuserbadges
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
