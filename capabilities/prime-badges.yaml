    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — Badges. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-list-badges
      description: Adobe Captivate List Badges
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-badges.getbadges
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-get-badge
      description: Adobe Captivate Get a Badge
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-badges.getbadge
      outputParameters:
      - type: object
        mapping: $.
