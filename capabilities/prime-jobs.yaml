naftiko: 1.0.0-alpha2
info:
  label: Adobe Captivate Prime API (Learning Manager) — Jobs
  description: 'Adobe Captivate Prime API (Learning Manager) — Jobs. 3 operations. Lead operation: Adobe Captivate List Jobs.
    Self-contained Naftiko capability covering one Adobe Captivate business surface.'
  tags:
  - Adobe Captivate
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADOBE_CAPTIVATE_API_KEY: ADOBE_CAPTIVATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: prime-jobs
    baseUri: https://learningmanager.adobe.com/primeapi/v2
    description: Adobe Captivate Prime API (Learning Manager) — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: getjobs
        method: GET
        description: Adobe Captivate List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter.status
          in: query
          type: string
          description: Filter by job status
      - name: createjob
        method: POST
        description: Adobe Captivate Create a Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-jobId
      path: /jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Adobe Captivate Get a Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ADOBE_CAPTIVATE_API_KEY}}'
  exposes:
  - type: rest
    namespace: prime-jobs-rest
    port: 8080
    description: REST adapter for Adobe Captivate Prime API (Learning Manager) — Jobs. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: getjobs
        description: Adobe Captivate List Jobs
        call: prime-jobs.getjobs
        with:
          filter.status: rest.filter.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createjob
        description: Adobe Captivate Create a Job
        call: prime-jobs.createjob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Adobe Captivate Get a Job
        call: prime-jobs.getjob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prime-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adobe Captivate Prime API (Learning Manager) — Jobs. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: adobe-captivate-list-jobs
      description: Adobe Captivate List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-jobs.getjobs
      with:
        filter.status: tools.filter.status
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-create-job
      description: Adobe Captivate Create a Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: prime-jobs.createjob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adobe-captivate-get-job
      description: Adobe Captivate Get a Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: prime-jobs.getjob
      outputParameters:
      - type: object
        mapping: $.
