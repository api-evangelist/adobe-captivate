specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Adobe Captivate
providerId: adobe-captivate
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - eLearning
  - Authoring
notes: >-
  Adobe Captivate is a desktop authoring application and does not expose a
  public REST API. There are no published per-second / per-minute rate
  limits. Activation and entitlement traffic flows through Adobe IMS
  licensing endpoints common to all Creative Cloud apps.
description: >-
  Adobe Captivate has no consumer-facing API surface. Network activity is
  limited to Adobe IMS license activation and asset library sync. This
  rate-limits artifact is retained for cataloging consistency only.
sources:
  - https://www.adobe.com/products/captivate.html
responseCodes:
  throttled: 429
limits:
  - name: License activation (Adobe IMS)
    scope: account
    metric: varies
    limit: not applicable - desktop authoring tool, no public API
    notes: >-
      Activation traffic flows through Adobe IMS and is shared across all
      Creative Cloud / Document Cloud / Captivate desktop apps; not separately
      documented.
policies:
  - name: Not applicable
    description: >-
      Captivate is a desktop authoring application; there is no public REST
      API for which rate limits apply.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
