notes: >-
  Adobe Captivate is per-seat SaaS without on-demand metering. FinOps levers
  are seat hygiene (reclaim unused seats) and right-sizing between
  individual, teams, and education SKUs. Public list pricing was not
  retrievable via WebFetch.
description: >-
  FOCUS-aligned FinOps shape for Adobe Captivate: simple per-seat monthly
  or annual subscription managed via the Adobe Admin Console.
sources:
  - https://www.adobe.com/products/captivate.html
