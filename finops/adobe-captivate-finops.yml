meters:
  - name: captivate_seat
    description: Per-seat monthly Captivate subscription
    unit: seat-month
    aggregation: sum
    dimensions:
      - sku
      - geography
principles:
  - name: Visibility
    description: >-
      Use the Adobe Admin Console seat assignment report to see active
      Captivate users per organisation.
  - name: Allocation
    description: >-
      Tag seats with department / cost-center metadata in the Admin Console
      so seat cost can be allocated to consuming teams.
  - name: Optimization
    description: >-
      Reclaim seats from inactive authors quarterly; consider Education /
      Government SKUs where eligible; bundle Captivate with Creative Cloud
      All Apps where the same author also needs Photoshop / Illustrator.
  - name: Accountability
    description: >-
      L&D / training-team owner is accountable for active seat count;
      finance reviews annual renewal against actual usage.
